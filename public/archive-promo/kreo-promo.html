<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KREO — Neural Design Engine</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cobalt: #060b18;
      --gold: #c9a84c;
      --cloud: #e8eaf0;
      --muted: rgba(232,234,240,0.22);
      --border: rgba(232,234,240,0.07);
    }

    html, body, #root {
      width: 100%; height: 100%;
      background: var(--cobalt);
      overflow: hidden;
    }

    * { font-family: 'Instrument Serif', Georgia, serif; }

    /* ── Global grain overlay ── */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: 999; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
      opacity: 0.55;
    }

    /* ── Scene wrapper ── */
    .scene-wrap {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }

    /* ── Transitions ── */
    .fade-enter  { animation: fadeUp 0.9s cubic-bezier(0.16,1,0.3,1) forwards; }
    .fade-exit   { animation: fadeDown 0.7s cubic-bezier(0.4,0,1,1) forwards; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes fadeDown {
      from { opacity: 1; transform: translateY(0); }
      to   { opacity: 0; transform: translateY(-20px); }
    }

    /* ── Corner wordmark ── */
    .wordmark {
      position: fixed; top: 2.5rem; left: 3rem; z-index: 100;
      font-size: 0.7rem; letter-spacing: 0.5em; text-transform: uppercase;
      color: var(--muted);
    }

    /* ── Progress bar ── */
    .progress-bar {
      position: fixed; bottom: 0; left: 0; height: 2px;
      background: linear-gradient(90deg, var(--gold), rgba(201,168,76,0.3));
      transition: width 0.1s linear;
    }

    /* ── Scene dots ── */
    .scene-dots {
      position: fixed; bottom: 2.5rem; left: 50%; transform: translateX(-50%);
      display: flex; gap: 0.5rem; z-index: 100;
    }
    .scene-dot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--border);
      transition: background 0.4s ease, transform 0.4s ease;
    }
    .scene-dot.active {
      background: var(--gold);
      transform: scale(1.4);
    }

    /* ── Ambient glow ── */
    .bg-glow {
      position: fixed; inset: 0; pointer-events: none;
      background: radial-gradient(ellipse 70% 60% at 50% 55%, rgba(201,168,76,0.055) 0%, transparent 70%);
    }

    /* ────── SCENE 1: MANIFESTO ────── */
    .s1-headline {
      font-size: clamp(3.5rem, 9vw, 7.5rem);
      font-weight: 400; line-height: 1.05;
      letter-spacing: -0.03em;
      text-align: center; color: var(--cloud);
      max-width: 860px;
    }
    .s1-gold { color: var(--gold); font-style: italic; }

    .s1-sub {
      margin-top: 2rem;
      font-size: 0.78rem; letter-spacing: 0.38em;
      text-transform: uppercase; color: var(--muted);
    }
    .s1-rule {
      width: 80px; height: 1px;
      background: rgba(201,168,76,0.3);
      margin: 2rem auto 0;
    }

    /* Word by word */
    .word-reveal {
      display: inline-block;
      opacity: 0; transform: translateY(36px);
      transition: opacity 0.85s cubic-bezier(0.16,1,0.3,1),
                  transform 0.85s cubic-bezier(0.16,1,0.3,1);
    }
    .word-reveal.in { opacity: 1; transform: none; }

    /* ────── SCENE 2: PROMPT CARD ────── */
    .s2-card {
      width: min(580px, 92vw);
      border: 1px solid var(--border);
      border-radius: 1.5rem;
      overflow: hidden;
      background: rgba(255,255,255,0.025);
      backdrop-filter: blur(24px);
    }
    .s2-chrome {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.85rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
    }
    .s2-dot { width: 9px; height: 9px; border-radius: 50%; background: var(--border); }
    .s2-body { padding: 1.75rem 2rem 1.25rem; }
    .s2-label {
      font-size: 0.6rem; letter-spacing: 0.38em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 0.9rem;
    }
    .s2-prompt {
      font-size: 1.3rem; font-style: italic;
      color: var(--cloud); line-height: 1.5;
      border-right: 2px solid var(--gold);
      white-space: nowrap; overflow: hidden;
      width: 0;
    }
    .s2-prompt.typing {
      animation: typeIn 1.9s steps(55, end) 0.3s forwards;
    }
    @keyframes typeIn { to { width: 100%; } }

    .s2-footer {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.1rem 2rem;
      border-top: 1px solid var(--border);
      opacity: 0; transition: opacity 0.8s ease 2.4s;
    }
    .s2-footer.in { opacity: 1; }
    .s2-flabel { font-size: 0.6rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--muted); }
    .s2-pill {
      display: flex; align-items: center; gap: 0.45rem;
      font-size: 0.65rem; letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--gold); border: 1px solid rgba(201,168,76,0.2);
      border-radius: 99px; padding: 0.28rem 0.85rem;
      background: rgba(201,168,76,0.04);
    }
    .s2-pdot {
      width: 5px; height: 5px; border-radius: 50%;
      background: var(--gold);
      animation: blink 1.3s ease-in-out infinite;
    }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.15} }

    .s2-caption {
      margin-top: 2rem;
      font-size: 0.7rem; letter-spacing: 0.42em;
      text-transform: uppercase; color: var(--muted);
      opacity: 0; transition: opacity 0.9s ease 3.4s;
      text-align: center;
    }
    .s2-caption.in { opacity: 1; }

    /* ────── SCENE 3: MODES ────── */
    .s3-eye {
      font-size: 0.68rem; letter-spacing: 0.44em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 3rem;
      opacity: 0; transition: opacity 0.9s ease 0.2s;
    }
    .s3-eye.in { opacity: 1; }
    .s3-grid {
      display: flex; gap: 1.25rem;
    }
    .s3-card {
      width: 190px; border-radius: 1.6rem;
      border: 1px solid transparent;
      padding: 1.6rem 1.4rem;
      display: flex; flex-direction: column; gap: 1rem;
      position: relative; overflow: hidden;
      opacity: 0; transform: translateY(44px) scale(0.95);
      transition: opacity 0.75s cubic-bezier(0.16,1,0.3,1),
                  transform 0.75s cubic-bezier(0.16,1,0.3,1);
    }
    .s3-card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 2px;
    }
    .s3-card.in { opacity: 1; transform: none; }

    .s3-ultra {
      background: linear-gradient(145deg, #0e1838 0%, #060b18 100%);
      border-color: rgba(201,168,76,0.15);
      transform-origin: center bottom;
    }
    .s3-ultra.in { transform: scale(1.05); }
    .s3-ultra::before { background: linear-gradient(90deg, var(--gold), transparent); }

    .s3-dark {
      background: rgba(255,255,255,0.02);
      border-color: rgba(255,255,255,0.06);
    }
    .s3-dark::before { background: linear-gradient(90deg, rgba(200,200,255,0.3), transparent); }

    .s3-light {
      background: rgba(248,248,252,0.05);
      border-color: rgba(248,248,252,0.1);
    }
    .s3-light::before { background: linear-gradient(90deg, rgba(248,248,252,0.35), transparent); }

    .s3-dot { width: 7px; height: 7px; border-radius: 50%; }
    .dot-gold { background: var(--gold); box-shadow: 0 0 8px rgba(201,168,76,0.45); }
    .dot-dim { background: rgba(232,234,240,0.35); }
    .dot-pale { background: rgba(232,234,240,0.6); }

    .s3-mlabel { font-size: 0.58rem; letter-spacing: 0.38em; text-transform: uppercase; color: var(--muted); }
    .s3-mtitle { font-size: 1.45rem; font-style: italic; line-height: 1.2; }
    .s3-title-gold { color: var(--gold); }
    .s3-title-dark { color: rgba(232,234,240,0.65); }
    .s3-title-light { color: rgba(232,234,240,0.45); }

    .s3-desc {
      font-size: 0.68rem; line-height: 1.65;
      color: rgba(232,234,240,0.22);
      font-style: normal; font-family: system-ui, sans-serif;
    }
    .s3-badge {
      display: inline-flex; align-items: center; gap: 0.35rem;
      font-size: 0.53rem; letter-spacing: 0.28em; text-transform: uppercase;
      color: var(--gold); border: 1px solid rgba(201,168,76,0.2);
      border-radius: 99px; padding: 0.22rem 0.65rem;
      background: rgba(201,168,76,0.05); width: fit-content;
    }

    /* ────── SCENE 4: ARTIFACTS ────── */
    .s4-eye {
      font-size: 0.68rem; letter-spacing: 0.44em;
      text-transform: uppercase; color: var(--muted);
      margin-bottom: 2.5rem;
      opacity: 0; transition: opacity 0.9s ease 0.2s;
    }
    .s4-eye.in { opacity: 1; }
    .s4-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.85rem;
      width: min(720px, 93vw);
    }
    .s4-tile {
      border: 1px solid var(--border);
      border-radius: 1.15rem;
      padding: 1.3rem;
      background: rgba(255,255,255,0.018);
      display: flex; flex-direction: column; gap: 0.35rem;
      min-height: 100px;
      position: relative; overflow: hidden;
      opacity: 0; transform: scale(0.92);
      transition: opacity 0.65s cubic-bezier(0.16,1,0.3,1),
                  transform 0.65s cubic-bezier(0.16,1,0.3,1);
    }
    .s4-tile::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1.5px;
    }
    .s4-tile.in { opacity: 1; transform: none; }

    .c-gold::before  { background: linear-gradient(90deg, var(--gold), transparent); }
    .c-blue::before  { background: linear-gradient(90deg, rgba(100,150,255,0.6), transparent); }
    .c-purple::before{ background: linear-gradient(90deg, rgba(180,100,220,0.6), transparent); }
    .c-green::before { background: linear-gradient(90deg, rgba(80,200,130,0.6), transparent); }
    .c-orange::before{ background: linear-gradient(90deg, rgba(255,130,70,0.6), transparent); }
    .c-cyan::before  { background: linear-gradient(90deg, rgba(70,200,240,0.6), transparent); }

    .s4-tag { font-size: 0.56rem; letter-spacing: 0.32em; text-transform: uppercase; color: var(--muted); }
    .s4-name { font-size: 1rem; font-style: italic; color: var(--cloud); }

    .s4-stats {
      display: flex; gap: 3.5rem; margin-top: 2.5rem;
      opacity: 0; transition: opacity 0.9s ease 3s;
    }
    .s4-stats.in { opacity: 1; }
    .s4-stat { text-align: center; }
    .s4-num { font-size: 2.2rem; letter-spacing: -0.03em; color: var(--gold); line-height: 1; }
    .s4-slabel { font-size: 0.58rem; letter-spacing: 0.32em; text-transform: uppercase; color: var(--muted); margin-top: 0.3rem; font-family: system-ui; font-style: normal; }

    /* ────── SCENE 5: FINALE ────── */
    .s5-logo {
      font-size: clamp(5rem, 14vw, 11rem);
      font-weight: 400; letter-spacing: -0.04em;
      color: var(--cloud); line-height: 1;
      opacity: 0; transform: scale(0.92);
      transition: opacity 1.1s cubic-bezier(0.16,1,0.3,1) 0.2s,
                  transform 1.1s cubic-bezier(0.16,1,0.3,1) 0.2s;
    }
    .s5-logo.in { opacity: 1; transform: none; }
    .s5-logo-gold { color: var(--gold); font-style: italic; }

    .s5-tagline {
      margin-top: 1.75rem;
      font-size: 0.75rem; letter-spacing: 0.42em;
      text-transform: uppercase; color: var(--muted);
      opacity: 0; transition: opacity 1s ease 1.4s;
    }
    .s5-tagline.in { opacity: 1; }

    .s5-rule {
      width: 0; height: 1px;
      background: rgba(201,168,76,0.35);
      margin: 2rem auto 0;
      transition: width 1.6s cubic-bezier(0.16,1,0.3,1) 2s;
    }
    .s5-rule.in { width: 160px; }

    .s5-version {
      margin-top: 1.5rem;
      font-size: 0.62rem; letter-spacing: 0.35em;
      text-transform: uppercase; color: rgba(232,234,240,0.12);
      opacity: 0; transition: opacity 0.8s ease 3s;
    }
    .s5-version.in { opacity: 1; }
  </style>
</head>
<body>
<div id="root"></div>

<script type="module">
import { useState, useEffect, useRef } from 'https://esm.sh/react@18';
import { createRoot } from 'https://esm.sh/react-dom@18/client';

const SCENE_DURATION = [5000, 6500, 6000, 6500, 7000]; // ms per scene
const TOTAL_SCENES = 5;

// ── Scene 1: Manifesto ──
function Scene1({ active }) {
  const [words, setWords] = useState([false, false, false]);
  const [sub, setSub] = useState(false);
  const [rule, setRule] = useState(false);

  useEffect(() => {
    if (!active) return;
    const t = [
      setTimeout(() => setWords(w => { const n=[...w]; n[0]=true; return n; }), 200),
      setTimeout(() => setWords(w => { const n=[...w]; n[1]=true; return n; }), 600),
      setTimeout(() => setWords(w => { const n=[...w]; n[2]=true; return n; }), 1100),
      setTimeout(() => setSub(true), 2600),
      setTimeout(() => setRule(true), 3200),
    ];
    return () => t.forEach(clearTimeout);
  }, [active]);

  return (
    <div className="scene-wrap" style={{ gap: '0', flexDirection: 'column', alignItems: 'center', justifyContent: 'center' }}>
      <div className="bg-glow"/>
      <h1 className="s1-headline">
        <span className={`word-reveal${words[0] ? ' in' : ''}`}>Build</span>{' '}
        <span className={`word-reveal${words[1] ? ' in' : ''}`}>your</span>{' '}
        <br/>
        <span className={`word-reveal s1-gold${words[2] ? ' in' : ''}`}>imagination</span>
      </h1>
      <p className={`s1-sub${sub ? ' fade-enter' : ''}`} style={{ opacity: sub ? 1 : 0, transition: 'opacity 1s ease' }}>
        Neural Design Engine
      </p>
      <div className="s1-rule" style={{ opacity: rule ? 1 : 0, transition: 'opacity 0.8s ease', width: rule ? '80px' : '0', transitionProperty: 'opacity, width', transitionDuration: '0.8s, 1.2s' }} />
    </div>
  );
}

// ── Scene 2: Prompt Card ──
function Scene2({ active }) {
  const [typing, setTyping] = useState(false);
  const [footer, setFooter] = useState(false);
  const [caption, setCaption] = useState(false);

  useEffect(() => {
    if (!active) return;
    const t = [
      setTimeout(() => setTyping(true), 400),
      setTimeout(() => setFooter(true), 2400),
      setTimeout(() => setCaption(true), 3600),
    ];
    return () => t.forEach(clearTimeout);
  }, [active]);

  return (
    <div className="scene-wrap" style={{ flexDirection: 'column', gap: '0' }}>
      <div className="bg-glow"/>
      <div className="s2-card fade-enter">
        <div className="s2-chrome">
          <div className="s2-dot"/>
          <div className="s2-dot"/>
          <div className="s2-dot"/>
        </div>
        <div className="s2-body">
          <p className="s2-label">Neural Prompt</p>
          <p className={`s2-prompt${typing ? ' typing' : ''}`}>
            "Design a luxury watch brand landing page"
          </p>
        </div>
        <div className={`s2-footer${footer ? ' in' : ''}`}>
          <span className="s2-flabel">Manifest Engine</span>
          <div className="s2-pill"><div className="s2-pdot"/>Generating &nbsp;—&nbsp; 2.8s</div>
        </div>
      </div>
      <p className={`s2-caption${caption ? ' in' : ''}`}>Describe. Generate. Ship.</p>
    </div>
  );
}

// ── Scene 3: Modes ──
function Scene3({ active }) {
  const [eye, setEye] = useState(false);
  const [cards, setCards] = useState([false, false, false]);

  useEffect(() => {
    if (!active) return;
    const t = [
      setTimeout(() => setEye(true), 200),
      setTimeout(() => setCards(c => { const n=[...c]; n[0]=true; return n; }), 500),
      setTimeout(() => setCards(c => { const n=[...c]; n[1]=true; return n; }), 800),
      setTimeout(() => setCards(c => { const n=[...c]; n[2]=true; return n; }), 1100),
    ];
    return () => t.forEach(clearTimeout);
  }, [active]);

  return (
    <div className="scene-wrap" style={{ flexDirection: 'column' }}>
      <div className="bg-glow"/>
      <p className={`s3-eye${eye ? ' in' : ''}`}>Three trajectories. One studio.</p>
      <div className="s3-grid">
        <div className={`s3-card s3-ultra${cards[0] ? ' in' : ''}`}>
          <div className="s3-dot dot-gold"/>
          <p className="s3-mlabel">Mode</p>
          <h2 className="s3-mtitle s3-title-gold">Ultra</h2>
          <p className="s3-desc">Deep cobalt. Neural glow. The cinematic default for every session.</p>
          <div className="s3-badge">★ Signature</div>
        </div>
        <div className={`s3-card s3-dark${cards[1] ? ' in' : ''}`}>
          <div className="s3-dot dot-dim"/>
          <p className="s3-mlabel">Mode</p>
          <h2 className="s3-mtitle s3-title-dark">Dark</h2>
          <p className="s3-desc">Obsidian architecture. Dithered waves. Precision without decoration.</p>
        </div>
        <div className={`s3-card s3-light${cards[2] ? ' in' : ''}`}>
          <div className="s3-dot dot-pale"/>
          <p className="s3-mlabel">Mode</p>
          <h2 className="s3-mtitle s3-title-light">Light</h2>
          <p className="s3-desc">Porcelain canvas. Editorial clarity. Where ideas breathe.</p>
        </div>
      </div>
    </div>
  );
}

// ── Scene 4: Artifacts ──
function Scene4({ active }) {
  const [eye, setEye] = useState(false);
  const [tiles, setTiles] = useState(Array(6).fill(false));
  const [stats, setStats] = useState(false);

  useEffect(() => {
    if (!active) return;
    const t = [
      setTimeout(() => setEye(true), 200),
      ...[0,1,2,3,4,5].map(i => setTimeout(() =>
        setTiles(p => { const n=[...p]; n[i]=true; return n; }), 500 + i*160
      )),
      setTimeout(() => setStats(true), 3000),
    ];
    return () => t.forEach(clearTimeout);
  }, [active]);

  const items = [
    ['Dashboard','Analytics','c-gold'],
    ['Landing Page','Marketing','c-blue'],
    ['Portfolio','Creative','c-purple'],
    ['Budget Tracker','Finance','c-green'],
    ['VC Pitch Deck','Presentation','c-orange'],
    ['Chat Interface','Product','c-cyan'],
  ];

  return (
    <div className="scene-wrap" style={{ flexDirection: 'column' }}>
      <div className="bg-glow"/>
      <p className={`s4-eye${eye ? ' in' : ''}`}>Anything you can describe, KREO can manifest.</p>
      <div className="s4-grid">
        {items.map(([name, tag, col], i) => (
          <div key={i} className={`s4-tile ${col}${tiles[i] ? ' in' : ''}`}>
            <p className="s4-tag">{tag}</p>
            <p className="s4-name">{name}</p>
          </div>
        ))}
      </div>
      <div className={`s4-stats${stats ? ' in' : ''}`}>
        <div className="s4-stat"><p className="s4-num">∞</p><p className="s4-slabel">Manifest types</p></div>
        <div className="s4-stat"><p className="s4-num">&lt;4s</p><p className="s4-slabel">Avg. generation</p></div>
        <div className="s4-stat"><p className="s4-num">1</p><p className="s4-slabel">Prompt needed</p></div>
      </div>
    </div>
  );
}

// ── Scene 5: Finale ──
function Scene5({ active }) {
  const [logo, setLogo] = useState(false);
  const [tag, setTag] = useState(false);
  const [rule, setRule] = useState(false);
  const [ver, setVer] = useState(false);

  useEffect(() => {
    if (!active) return;
    const t = [
      setTimeout(() => setLogo(true), 200),
      setTimeout(() => setTag(true), 1400),
      setTimeout(() => setRule(true), 2000),
      setTimeout(() => setVer(true), 3000),
    ];
    return () => t.forEach(clearTimeout);
  }, [active]);

  return (
    <div className="scene-wrap" style={{ flexDirection: 'column', textAlign: 'center' }}>
      <div className="bg-glow"/>
      <p className={`s5-logo${logo ? ' in' : ''}`}>KRE<span className="s5-logo-gold">O</span></p>
      <p className={`s5-tagline${tag ? ' in' : ''}`}>Neural Design Engine</p>
      <div className={`s5-rule${rule ? ' in' : ''}`}/>
      <p className={`s5-version${ver ? ' in' : ''}`}>Production 2025 &nbsp;·&nbsp; Built on Sarvam 105B</p>
    </div>
  );
}

// ── Main App ──
function App() {
  const [scene, setScene] = useState(0);
  const [exiting, setExiting] = useState(false);
  const [progress, setProgress] = useState(0);
  const timerRef = useRef(null);
  const tickRef = useRef(null);

  useEffect(() => {
    const dur = SCENE_DURATION[scene];
    let elapsed = 0;
    const tick = 50;

    tickRef.current = setInterval(() => {
      elapsed += tick;
      setProgress((elapsed / dur) * 100);
    }, tick);

    timerRef.current = setTimeout(() => {
      if (scene < TOTAL_SCENES - 1) {
        setExiting(true);
        setTimeout(() => {
          setScene(s => s + 1);
          setProgress(0);
          setExiting(false);
        }, 650);
      }
    }, dur);

    return () => {
      clearInterval(tickRef.current);
      clearTimeout(timerRef.current);
    };
  }, [scene]);

  const scenes = [Scene1, Scene2, Scene3, Scene4, Scene5];
  const ActiveScene = scenes[scene];

  return (
    <>
      <p className="wordmark">KREO</p>

      <div style={{ opacity: exiting ? 0 : 1, transition: 'opacity 0.65s ease' }}>
        <ActiveScene active={!exiting} />
      </div>

      {/* Progress bar */}
      <div className="progress-bar" style={{ width: `${progress}%` }} />

      {/* Scene dots */}
      <div className="scene-dots">
        {Array.from({ length: TOTAL_SCENES }).map((_, i) => (
          <div key={i} className={`scene-dot${i === scene ? ' active' : ''}`}
            onClick={() => {
              clearInterval(tickRef.current);
              clearTimeout(timerRef.current);
              setScene(i);
              setProgress(0);
              setExiting(false);
            }}
            style={{ cursor: 'pointer' }}
          />
        ))}
      </div>
    </>
  );
}

createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
