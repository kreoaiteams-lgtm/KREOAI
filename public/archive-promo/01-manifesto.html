<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KREO — Build your imagination</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cobalt: #0a0f1e;
      --gold: #c9a84c;
      --cloud: #e8eaf0;
      --muted: rgba(232,234,240,0.25);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--cobalt);
      overflow: hidden;
      font-family: 'Instrument Serif', Georgia, serif;
    }

    .scene {
      width: 100vw; height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      position: relative;
    }

    /* Noise grain overlay */
    .scene::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      opacity: 0.4; pointer-events: none; z-index: 100;
    }

    /* Ambient glow */
    .glow {
      position: absolute;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(201,168,76,0.06) 0%, transparent 70%);
      border-radius: 50%;
      animation: pulse 6s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50% { transform: scale(1.15); opacity: 1; }
    }

    /* Word-by-word reveal */
    .headline {
      font-size: clamp(3.5rem, 9vw, 8rem);
      font-weight: 400;
      color: var(--cloud);
      line-height: 1.05;
      letter-spacing: -0.03em;
      text-align: center;
      max-width: 900px;
      z-index: 1;
    }

    .word {
      display: inline-block;
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.9s cubic-bezier(0.16, 1, 0.3, 1),
                  transform 0.9s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .word.gold { color: var(--gold); font-style: italic; }

    .word.visible { opacity: 1; transform: translateY(0); }

    .tagline {
      margin-top: 2.5rem;
      font-size: 0.875rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0;
      transition: opacity 1.2s ease 2.8s;
      z-index: 1;
    }
    .tagline.visible { opacity: 1; }

    /* Thin gold rule */
    .rule {
      position: absolute;
      bottom: 12vh;
      width: 0;
      height: 1px;
      background: var(--gold);
      opacity: 0.3;
      transition: width 1.8s cubic-bezier(0.16, 1, 0.3, 1) 3.4s;
    }
    .rule.visible { width: 120px; }

    /* Corner wordmark */
    .wordmark {
      position: fixed;
      top: 2.5rem; left: 3rem;
      font-size: 0.75rem;
      letter-spacing: 0.5em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0;
      transition: opacity 0.8s ease 0.2s;
      z-index: 10;
    }
    .wordmark.visible { opacity: 1; }
  </style>
</head>
<body>
  <div class="scene">
    <div class="glow"></div>

    <p class="wordmark" id="wm">KREO</p>

    <h1 class="headline">
      <span class="word" id="w0">Build</span>&nbsp;
      <span class="word" id="w1">your</span>&nbsp;
      <span class="word gold" id="w2">imagination</span>
    </h1>

    <p class="tagline" id="tl">Neural Design Engine &nbsp;·&nbsp; 2025</p>

    <div class="rule" id="rule"></div>
  </div>

  <script>
    const delays = [0, 400, 900];
    const words = document.querySelectorAll('.word');
    words.forEach((w, i) => setTimeout(() => w.classList.add('visible'), delays[i] + 300));

    setTimeout(() => document.getElementById('tl').classList.add('visible'), 2800);
    setTimeout(() => document.getElementById('rule').classList.add('visible'), 3400);
    setTimeout(() => document.getElementById('wm').classList.add('visible'), 200);
  </script>
</body>
</html>
