<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>KREO — Describe. Generate. Ship.</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --cobalt: #070c1a;
      --gold: #c9a84c;
      --cloud: #e8eaf0;
      --muted: rgba(232,234,240,0.2);
      --border: rgba(232,234,240,0.07);
    }

    html, body {
      width: 100%; height: 100%;
      background: var(--cobalt);
      overflow: hidden;
      font-family: 'Instrument Serif', Georgia, serif;
      color: var(--cloud);
    }

    .scene {
      width: 100vw; height: 100vh;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }

    /* Radial bg gradient */
    .bg-glow {
      position: fixed; inset: 0;
      background: radial-gradient(ellipse 80% 60% at 50% 60%, rgba(201,168,76,0.05) 0%, transparent 70%);
      pointer-events: none;
    }

    /* The terminal card */
    .card {
      width: min(640px, 92vw);
      border: 1px solid var(--border);
      border-radius: 1.5rem;
      overflow: hidden;
      background: rgba(255,255,255,0.02);
      backdrop-filter: blur(24px);
      opacity: 0;
      transform: translateY(32px);
      transition: opacity 0.9s cubic-bezier(0.16,1,0.3,1) 0.3s,
                  transform 0.9s cubic-bezier(0.16,1,0.3,1) 0.3s;
    }
    .card.visible { opacity: 1; transform: none; }

    /* Card chrome */
    .card-chrome {
      display: flex; align-items: center; gap: 0.5rem;
      padding: 0.875rem 1.25rem;
      border-bottom: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
    }
    .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--border);
    }

    /* Prompt area */
    .prompt-area {
      padding: 2rem 2rem 1rem;
      min-height: 120px;
    }
    .prompt-label {
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
    }
    .prompt-text {
      font-size: 1.4rem;
      font-style: italic;
      line-height: 1.5;
      color: var(--cloud);
      border-right: 2px solid var(--gold);
      white-space: nowrap;
      overflow: hidden;
      width: 0;
      animation: typeIn 1.8s steps(60, end) 1s forwards;
    }
    @keyframes typeIn {
      to { width: 100%; }
    }

    /* Divider */
    .divider {
      height: 1px;
      background: var(--border);
      margin: 0 2rem;
    }

    /* Output row */
    .output-row {
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.25rem 2rem;
      opacity: 0;
      transition: opacity 0.8s ease 3.2s;
    }
    .output-row.visible { opacity: 1; }

    .output-label {
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .status-pill {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.7rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--gold);
      border: 1px solid rgba(201,168,76,0.2);
      border-radius: 99px;
      padding: 0.3rem 0.9rem;
      background: rgba(201,168,76,0.05);
    }
    .status-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--gold);
      animation: blink 1.4s ease-in-out infinite 3.4s;
      opacity: 0;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.2; }
    }

    /* Bottom caption */
    .caption {
      position: fixed;
      bottom: 3rem;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.75rem;
      letter-spacing: 0.4em;
      text-transform: uppercase;
      color: var(--muted);
      opacity: 0;
      transition: opacity 1s ease 4s;
      white-space: nowrap;
    }
    .caption.visible { opacity: 1; }

    .wordmark {
      position: fixed; top: 2.5rem; left: 3rem;
      font-size: 0.7rem; letter-spacing: 0.5em;
      text-transform: uppercase; color: var(--muted);
      opacity: 0; transition: opacity 0.8s ease 0.1s;
    }
    .wordmark.visible { opacity: 1; }
  </style>
</head>
<body>
  <div class="bg-glow"></div>

  <p class="wordmark" id="wm">KREO</p>

  <div class="scene">
    <div class="card" id="card">
      <div class="card-chrome">
        <div class="dot"></div>
        <div class="dot"></div>
        <div class="dot"></div>
      </div>

      <div class="prompt-area">
        <p class="prompt-label">Neural Prompt</p>
        <p class="prompt-text">"Build a luxury e-commerce page for a watch brand"</p>
      </div>

      <div class="divider"></div>

      <div class="output-row" id="output">
        <span class="output-label">Manifest Output</span>
        <div class="status-pill">
          <div class="status-dot"></div>
          Generating&nbsp;&nbsp;—&nbsp;&nbsp;3.2s
        </div>
      </div>
    </div>
  </div>

  <p class="caption" id="cap">Describe. Generate. Ship.</p>

  <script>
    setTimeout(() => document.getElementById('wm').classList.add('visible'), 100);
    setTimeout(() => document.getElementById('card').classList.add('visible'), 300);
    setTimeout(() => document.getElementById('output').classList.add('visible'), 3200);
    setTimeout(() => document.getElementById('cap').classList.add('visible'), 4000);
    // Animate the status dot glow once visible
    setTimeout(() => {
      document.querySelector('.status-dot').style.opacity = '1';
    }, 3400);
  </script>
</body>
</html>
